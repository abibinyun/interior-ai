name: interior-ai

services:
  postgres:
    image: postgres:16-alpine
    container_name: interior-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: interior
      POSTGRES_PASSWORD: interior
      POSTGRES_DB: interior
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interior -d interior"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile.dev
    container_name: interior-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://interior:interior@postgres:5432/interior?schema=public
    entrypoint: ["npx", "prisma", "migrate", "deploy", "--schema=prisma/schema.prisma"]
    restart: "no"

  backend:
    profiles: ["dev", "prod"]
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile.dev
    container_name: interior-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://interior:interior@postgres:5432/interior?schema=public
      SESSION_COOKIE_NAME: sid
      SESSION_COOKIE_SECRET: change-me-in-prod-min-32-chars-ok
      CORS_ORIGINS: http://localhost:5173
      AI_PROVIDER: ${AI_PROVIDER:-pollinations}
      AI_PRIMARY_BASE_URL: ${AI_PRIMARY_BASE_URL:-https://gen.pollinations.ai}
      AI_FALLBACK_BASE_URL: ${AI_FALLBACK_BASE_URL:-https://api.myceli.ai}
      AI_PRIMARY_API_KEY: ${AI_PRIMARY_API_KEY:-}
      AI_FALLBACK_API_KEY: ${AI_FALLBACK_API_KEY:-}
      AI_HORDE_BASE_URL: ${AI_HORDE_BASE_URL:-https://stablehorde.net/api}
      AI_HORDE_API_KEY: ${AI_HORDE_API_KEY:-}
      GENERATION_TIMEOUT_MS: 60000
      GENERATION_HARD_TIMEOUT_MS: 120000
      STORAGE_PROVIDER: supabase
      SUPABASE_URL: ${SUPABASE_URL:-https://ouuvllkqdjqwnottssod.supabase.co}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-generations}
      SIGNED_URL_TTL_SECONDS: 900
      RATE_LIMIT_GENERATIONS_MAX: ${RATE_LIMIT_GENERATIONS_MAX:-5}
      RATE_LIMIT_GENERATIONS_WINDOW_MS: ${RATE_LIMIT_GENERATIONS_WINDOW_MS:-60000}
      RATE_LIMIT_DISABLED: ${RATE_LIMIT_DISABLED:-false}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend/src:/repo/apps/backend/src:ro

  frontend:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile.dev
    container_name: interior-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      # The Vite dev server proxies /api/* to this target.
      VITE_API_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend/src:/app/src:ro
      - ./apps/frontend/index.html:/app/index.html:ro
      - ./apps/frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./apps/frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./apps/frontend/postcss.config.js:/app/postcss.config.js:ro

  # F12: Production frontend — multi-stage build (deps → build →
  # runtime) served by nginx with the SPA-fallback + /api proxy
  # config. The bundle is baked with VITE_API_TARGET unset; the
  # SPA uses relative URLs and nginx routes /api/* to the backend
  # service. CORS becomes a non-issue because the SPA and the
  # API share an origin (https://host/api/... → proxied internally).
  frontend-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile
      args:
        # The build arg is informational only; the SPA uses
        # relative URLs and the nginx proxy routes /api/* to the
        # backend service.
        VITE_API_TARGET: ""
    container_name: interior-frontend-prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  postgres-data:
