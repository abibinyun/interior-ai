# Frontend nginx config — serves the static SPA bundle and proxies
# /api/* to the backend service.
#
# In Docker, `backend` is the compose service name. Override at
# deploy time via the BACKEND_UPSTREAM env var if needed.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 5173;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip text responses
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml;
  gzip_min_length 1024;

  # Long-cache hashed Vite assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API proxy — backend in compose
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 90s;
  }

  # SPA fallback — every unknown route serves index.html so React
  # Router's client-side routing takes over.
  location / {
    try_files $uri $uri/ /index.html;
  }
}