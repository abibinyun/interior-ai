# Frontend nginx config — serves the static SPA bundle only.
# /api/* routing is handled by Traefik (PathPrefix in the homelab
# deploy). The SPA uses relative URLs (/api/...) and Traefik owns
# the path-matching before the request reaches nginx.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml;
  gzip_min_length 1024;

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # SPA fallback — every unknown route serves index.html.
  # /api/* is NOT here — Traefik routes it to the backend before
  # this container receives the request.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
